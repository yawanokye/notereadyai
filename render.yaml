services:
  - type: web
    name: noteready-ai
    runtime: python
    plan: starter
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: ENVIRONMENT
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-pro
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: MAX_EXTRACTED_CHARS
        value: 200000
      - key: LECTURE_BATCH_MAX_TOKENS
        value: 7500
      - key: ASSESSMENT_MAX_TOKENS
        value: 3000
      - key: SUMMARY_MAX_TOKENS
        value: 7000
      - key: GENERATED_FILES_DIR
        value: generated
